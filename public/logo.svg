<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #fff; }
    .mark {
      fill: #050505;
      font: 650 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #050505; }
      .mark { fill: #fff; }
    }
  </style>
  <rect class="bg" x="4" y="4" width="56" height="56" rx="14"/>
  <text class="mark" x="32" y="39" text-anchor="middle">&lt;x/&gt;</text>
</svg>
